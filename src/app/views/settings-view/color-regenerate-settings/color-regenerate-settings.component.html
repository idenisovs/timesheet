<section class="card">
	<div class="card-body d-flex justify-content-between align-items-center">
		<div>
			<div class="fw-semibold">Regenerate activity colors</div>
			<small class="text-muted">
				Resets the color counter so the next generated color starts from the beginning of the sequence.
			</small>
		</div>
		<button type="button" class="btn btn-outline-danger ms-4 flex-shrink-0" (click)="regenerate()">
			<i class="material-symbols-outlined">refresh</i>
			Regenerate
		</button>
	</div>
</section>
