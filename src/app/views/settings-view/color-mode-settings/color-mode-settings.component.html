<section class="card">
	<div class="card-body">
		<div [formGroup]="form()" class="d-flex justify-content-between align-items-center">
			<label for="colorModeSwitch" style="cursor: pointer;">
				<div class="fw-semibold">Opposite color mode</div>
				<small class="text-muted">
					When enabled, new activity colors are distributed using the golden angle (137°),
					producing maximally distinct hues. When disabled, colors step by 49° for a more
					sequential progression.
				</small>
				<div class="d-flex flex-wrap gap-1 mt-2">
					@for (color of previewColors(); track color) {
						<span style="width: 20px; height: 20px; border-radius: 2px; display: inline-block;" [style.background-color]="color"></span>
					}
				</div>
			</label>
			<div class="form-check form-switch mb-0 ms-4 flex-shrink-0">
				<input
					id="colorModeSwitch"
					type="checkbox"
					role="switch"
					class="form-check-input"
					style="cursor: pointer;"
					formControlName="isOppositeColorMode"
				>
			</div>
		</div>
	</div>
</section>
