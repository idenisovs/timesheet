<section class="mb-4" [ngClass]="{'visually-hidden': isHidden()}">
	<app-week-header
		[week]="week()"
		[days]="days()"
		[summary]="summary"
		(missingDaysVisible)="isMissingDaysVisible = $event"
	/>

	@for (day of days(); track day) {
		<div class="mt-3">
			<app-daily-activities-week-day
				[day]="day"
				[isMissingDaysVisible]="isMissingDaysVisible"
				(changes)="recalculateActivitySummary()"
			/>
		</div>
	}
</section>
