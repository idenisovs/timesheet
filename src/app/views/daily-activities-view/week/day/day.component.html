@if (activities().length > 0) {
	@if (isMobile()) {
		<app-day-mobile
			[day]="day()"
			[activities]="activities()"
			(changes)="saveActivities($event)"
		/>
	} @else {
		<app-day-desktop
			[day]="day()"
			[activities]="activities()"
			(changes)="saveActivities($event)"
		/>
	}
}

@if (activities().length === 0 && isMissingDaysVisible()) {
	<app-daily-activities-week-day-missing [day]="day()" (appendMissingDay)="appendMissingDay($event)"/>
}
