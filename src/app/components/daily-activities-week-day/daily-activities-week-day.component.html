@if (isMobile()) {
	<app-daily-activities-week-day-mobile
		[day]="day()"
		[isMissingDaysVisible]="isMissingDaysVisible()"
		(changes)="changes.emit()"
	/>
} @else {
	<app-daily-activities-week-day-desktop
		[day]="day()"
		[isMissingDaysVisible]="isMissingDaysVisible()"
		(changes)="changes.emit()"
	/>
}
