<div class="card d-md-none bg-secondary-subtle mb-3">
	<main class="card-body py-2">
		<app-daily-activities-week-day-header [day]="day()"/>
	</main>
</div>

@for (activity of sorted(); track activity.id) {
	<div class="d-flex gap-2">
		<div class="d-flex flex-column text-center py-2 me-1" style="min-width: 40px">
			@if (activity.till) {
				<div>{{activity.till}}</div>
			}

			@if (activity.from && activity.till) {
				<div>-</div>
			}

			@if (activity.from) {
				<div>{{activity.from}}</div>
			}
		</div>
		<div class="border border-end border-dark-subtle" [ngClass]="{'invisible': !activity.from && !activity.till}"></div>
		<div class="card my-2 flex-grow-1" [style]="{'border-color': activity.color}">
			<div class="card-body">
				{{activity.name}}
			</div>
		</div>
	</div>

}
