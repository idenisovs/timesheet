<div class="card bg-secondary text-white">
  <div class="card-body d-flex justify-content-between align-items-center flex-wrap py-2">
    <div class="flex-grow-1 mb-1 mb-md-0">
      <i class="material-symbols-outlined text-white">today</i>
      {{week.from|date}}
      <span class="mx-2">-</span>
      {{week.till|date}}
    </div>

    <div class="d-flex align-items-center flex-wrap">
      <span class="me-2 order-last order-md-first flex-grow-1 flex-md-grow-0">
        <button class="btn btn-sm btn-link link-light p-0 align-top me-1" (click)="toggleMissingDays()">
          {{MissingDaysButtonLabel}}
        </button>
      </span>

      <span class="me-2 text-nowrap">
        <i class="material-symbols-outlined text-white">assignment</i>
        {{summary.activities}}
      </span>

      <span class="me-2 text-nowrap">
        <i class="material-symbols-outlined text-white">schedule</i>
        {{summary.duration}}
      </span>

      <button class="btn btn-sm btn-secondary" title="Weekly Overview" (click)="displayWeeklyOverview()">
        <i class="material-symbols-outlined">
          donut_large
        </i>
      </button>
    </div>
  </div>
</div>
