<section class="alert alert-info p-2 mb-3">
	<div class="d-flex justify-content-between align-items-center">
		<div>
			{{ day().date | date }} {{ day().date | date:'EEEE' }}
		</div>
		<div>
			<button class="btn btn-sm btn-link m-0 text-decoration-none link-dark" (click)="appendMissingDay.emit(day())">
				<i class="material-symbols-outlined">file_open</i>
			</button>
		</div>
	</div>
</section>
