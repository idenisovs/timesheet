<section class="card mt-3">
	<header class="card-header fw-bold">
		Project Import
	</header>

	<main class="card-body">
		@for (project of importedProjects; track project.id) {
			<app-imported-project-diff
				[importedProject]="project"
				(completed)="removeCompletedProject($event)"
			/>
		}
	</main>
</section>
