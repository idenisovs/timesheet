<section class="card">
	<div class="card-body">
		<div [formGroup]="form()" class="d-flex align-items-center gap-3">
			<div class="form-check form-switch mb-0">
				<input
					id="timeRoundingSwitch"
					type="checkbox"
					role="switch"
					class="form-check-input"
					style="cursor: pointer;"
					formControlName="isTimeRoundingEnabled"
				>
			</div>
			<label for="timeRoundingSwitch" style="cursor: pointer;">
				<div class="fw-semibold">Round activity times</div>
				<small class="text-muted">
					When enabled, activity times are rounded to the nearest 5 minutes.
					For example, 13:47 becomes 13:50, and 13:44 becomes 13:45.
				</small>
			</label>
		</div>
	</div>
</section>
