<div class="row">
	<div class="col-12">
		<section class="card">
			<header class="card-header fw-bold">
				Time Rounding
			</header>
			<div class="card-body">
				<form [formGroup]="form">
					<div class="form-check form-switch">
						<input
							id="timeRoundingSwitch"
							type="checkbox"
							role="switch"
							class="form-check-input"
							style="cursor: pointer;"
							formControlName="isTimeRoundingEnabled"
						>
						<label class="form-check-label" for="timeRoundingSwitch" style="cursor: pointer;">
							<strong>Round activity times</strong>
						</label>
					</div>
				</form>
				<small class="text-muted">
					When enabled, activity times are rounded to the nearest 5 minutes.
					For example, 13:47 becomes 13:50, and 13:44 becomes 13:45.
				</small>
			</div>
		</section>
	</div>
</div>
