<header class="modal-header">
	<h4 class="modal-title">Regenerate Activity Colors</h4>
</header>

<main class="modal-body">
	<p>This will reset the color counter and generate new colors for future activities.</p>
	<p class="text-danger mb-0">This action cannot be undone.</p>
</main>

<footer class="modal-footer">
	<button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
	<button type="button" class="btn btn-danger" (click)="confirm()">Regenerate</button>
</footer>
